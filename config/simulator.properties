# ===== Transaction Simulator Configuration =====
# All parameters below are required to be configurable by the project spec.
# Each value can also be overridden from the command line, e.g.:
#   java ... TransactionSimulator rate.per.minute=300 anomaly.percent=5

# Port on which the simulator exposes the transaction stream (TCP socket)
simulator.port=9999

# Size of the simulated world.
# Note: num.cards is deliberately high relative to the transaction rate,
# so that a NORMAL card sees ~1.2 transactions per 2-minute window -
# far below the High Frequency threshold (5). This keeps false positives
# near zero and ensures alerts correspond to deliberately injected anomalies.
num.customers=50
num.cards=200
num.merchants=30

# Average number of transactions generated per minute
rate.per.minute=120

# Percentage of transactions that are intentionally anomalous (0-100).
# Used to validate the anomaly-detection rules in the Flink job.
anomaly.percent=2.0

# Random seed. A FIXED seed makes the simulated world (home countries,
# customer profiles) identical across simulator restarts. This matters:
# the Flink job's keyed state remembers each card's last country, so if
# the simulator restarts with a NEW random world while the job keeps
# running, stale state would create false Impossible Travel alerts.
# Set to -1 for a different world on every run.
random.seed=42

# BONUS (event time): percentage of events emitted with a backdated
# event_time (45-120 seconds in the past), to exercise the Flink job's
# watermark / allowed-lateness / side-output handling of late events.
late.percent=1.0
